<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>分解思考シミュレーター</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1f2e;
      color: #f0f0f0;
      font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
    }

    .screen { display: none; }
    .screen.active { display: block; }

    /* タイトル画面 */
    .title-screen {
      text-align: center;
      padding: 40px 20px;
    }

    .title-screen h1 {
      font-size: 1.6rem;
      color: #f5a623;
      margin-bottom: 12px;
      line-height: 1.4;
    }

    .title-screen p {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 40px;
      line-height: 1.7;
    }

    .genre-cards {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .genre-card {
      background: #2a2f3e;
      border: 2px solid #3a3f4e;
      border-radius: 16px;
      padding: 28px 20px;
      width: 160px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .genre-card:hover {
      border-color: #f5a623;
      transform: translateY(-4px);
      background: #2f3545;
    }

    .genre-card .icon {
      font-size: 2.4rem;
      margin-bottom: 12px;
    }

    .genre-card .label {
      font-size: 1rem;
      font-weight: bold;
      color: #f0f0f0;
    }

    /* ゲーム画面 */
    .game-screen {
      padding: 20px 0;
    }

    .progress-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .progress-label {
      font-size: 0.85rem;
      color: #f5a623;
      font-weight: bold;
    }

    .progress-dots {
      display: flex;
      gap: 8px;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #3a3f4e;
    }

    .dot.active { background: #f5a623; }
    .dot.done { background: #f5a623; opacity: 0.4; }

    .scene-box {
      background: #2a2f3e;
      border-radius: 20px;
      padding: 28px 24px;
      margin-bottom: 20px;
    }

    .character-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-bottom: 20px;
    }

    .character-icon {
      font-size: 2rem;
      background: #3a3f4e;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .bubble {
      background: #343a4e;
      border-radius: 0 16px 16px 16px;
      padding: 14px 18px;
      font-size: 0.95rem;
      line-height: 1.7;
      color: #f0f0f0;
      flex: 1;
    }

    .situation-label {
      font-size: 0.75rem;
      color: #f5a623;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .question-text {
      font-size: 1rem;
      font-weight: bold;
      color: #f0f0f0;
      line-height: 1.6;
      margin-top: 16px;
    }

    .choices {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-btn {
      background: #2a2f3e;
      border: 2px solid #3a3f4e;
      border-radius: 14px;
      padding: 18px 20px;
      color: #f0f0f0;
      font-size: 0.95rem;
      line-height: 1.6;
      cursor: pointer;
      text-align: left;
      transition: all 0.2s;
      font-family: inherit;
    }

    .choice-btn:hover:not(:disabled) {
      border-color: #f5a623;
      background: #2f3545;
    }

    .choice-btn:disabled { cursor: default; opacity: 0.6; }
    .choice-btn.selected { border-color: #f5a623; background: #2f3545; }

    /* リアクション吹き出し */
    .reaction-row {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      margin-top: 16px;
      opacity: 0;
      transform: translateX(-10px);
      transition: all 0.3s ease;
    }

    .reaction-row.show {
      opacity: 1;
      transform: translateX(0);
    }

    .reaction-bubble {
      background: #f5a623;
      border-radius: 0 16px 16px 16px;
      padding: 12px 18px;
      font-size: 0.95rem;
      line-height: 1.6;
      color: #1a1f2e;
      font-weight: bold;
      flex: 1;
    }

    .next-btn {
      display: block;
      width: 100%;
      margin-top: 20px;
      background: #f5a623;
      color: #1a1f2e;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .next-btn:hover { background: #e09510; transform: translateY(-2px); }

    /* 結果画面 */
    .result-screen {
      text-align: center;
      padding: 30px 20px;
    }

    .result-intro {
      font-size: 0.95rem;
      color: #aaa;
      margin-bottom: 8px;
    }

    .result-character {
      font-size: 1.6rem;
      color: #f5a623;
      font-weight: bold;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .result-emoji {
      font-size: 3rem;
      margin: 16px 0;
    }

    .result-tagline {
      font-size: 0.95rem;
      color: #ccc;
      line-height: 1.7;
      margin-bottom: 28px;
    }

    .diagnosis-box {
      background: #2a2f3e;
      border-radius: 16px;
      padding: 24px 22px;
      margin-bottom: 24px;
      text-align: left;
    }

    .diagnosis-title {
      font-size: 0.8rem;
      color: #f5a623;
      font-weight: bold;
      margin-bottom: 10px;
      letter-spacing: 0.05em;
    }

    .diagnosis-text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #f0f0f0;
    }

    .cta-box {
      background: #1e2a3e;
      border: 2px solid #f5a623;
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 24px;
      text-align: left;
    }

    .cta-text {
      font-size: 0.92rem;
      line-height: 1.75;
      color: #f0f0f0;
      margin-bottom: 16px;
    }

    .return-btn {
      display: block;
      width: 100%;
      background: #f5a623;
      color: #1a1f2e;
      border: none;
      border-radius: 14px;
      padding: 16px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      text-decoration: none;
      text-align: center;
    }

    .return-btn:hover { background: #e09510; transform: translateY(-2px); }

    .retry-btn {
      display: block;
      width: 100%;
      margin-top: 12px;
      background: transparent;
      color: #aaa;
      border: 2px solid #3a3f4e;
      border-radius: 14px;
      padding: 14px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
    }

    .retry-btn:hover { border-color: #aaa; color: #f0f0f0; }

    @media (max-width: 480px) {
      .genre-cards { flex-direction: column; align-items: center; }
      .genre-card { width: 100%; max-width: 280px; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- タイトル画面 -->
  <div class="screen active" id="screen-title">
    <div class="title-screen">
      <h1>分解思考<br>シミュレーター</h1>
      <p>あなたは「分解していい部分」と<br>「分解してはいけない部分」を<br>見分けられますか？</p>
      <div class="genre-cards">
        <div class="genre-card" onclick="startGame('work')">
          <div class="icon">💼</div>
          <div class="label">仕事</div>
        </div>
        <div class="genre-card" onclick="startGame('diet')">
          <div class="icon">🥗</div>
          <div class="label">ダイエット</div>
        </div>
        <div class="genre-card" onclick="startGame('date')">
          <div class="icon">💬</div>
          <div class="label">デート</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ゲーム画面 -->
  <div class="screen" id="screen-game">
    <div class="game-screen">
      <div class="progress-bar">
        <span class="progress-label" id="progress-label">場面 1 / 3</span>
        <div class="progress-dots">
          <div class="dot" id="dot-0"></div>
          <div class="dot" id="dot-1"></div>
          <div class="dot" id="dot-2"></div>
        </div>
      </div>

      <div class="scene-box">
        <div class="character-row">
          <div class="character-icon">🧑</div>
          <div class="bubble">
            <div class="situation-label">【状況】</div>
            <div id="situation-text"></div>
          </div>
        </div>
        <div class="question-text" id="question-text"></div>
      </div>

      <div class="choices">
        <button class="choice-btn" id="choice-a" onclick="selectChoice(0)"></button>
        <button class="choice-btn" id="choice-b" onclick="selectChoice(1)"></button>
      </div>

      <div class="reaction-row" id="reaction-row">
        <div class="character-icon">🧑</div>
        <div class="reaction-bubble" id="reaction-text"></div>
      </div>

      <button class="next-btn" id="next-btn" onclick="nextScene()" style="display:none;">次へ ▶</button>
    </div>
  </div>

  <!-- 結果画面 -->
  <div class="screen" id="screen-result">
    <div class="result-screen">
      <div class="result-intro">あなたの思考の癖は…</div>
      <div class="result-character" id="result-character"></div>
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-tagline" id="result-tagline"></div>
      <div class="diagnosis-box">
        <div class="diagnosis-title">【あなたの分解思考の傾向】</div>
        <div class="diagnosis-text" id="diagnosis-text"></div>
      </div>
      <div class="cta-box">
        <div class="cta-text">次の章には、コピペで使えるプロンプトを用意しています。ぱっと思いつくもやもやを、試しに繁雑か複雑かに分けてみてください。</div>
        <a href="YOUR_NOTE_URL" target="_blank" class="return-btn">記事に戻る ▶</a>
      </div>
      <button class="retry-btn" onclick="resetGame()">別のジャンルで試す</button>
    </div>
  </div>

</div>

<script>
  const scenarios = {
    work: {
      scenes: [
        {
          situation: "来週、上司にプロジェクトの進捗を報告する。",
          question: "さて、何を準備する？",
          choices: ["報告する数字やデータを整理してスライドにまとめる", "「上司が納得する伝え方」を考える"],
          reactions: ["資料、前日の夜に作り直したりする？", "上司の顔、思い浮かべながら考えてるでしょ。"],
          complexChoice: 1
        },
        {
          situation: "同僚から「最近仕事がうまくいかない」と相談された。",
          question: "さて、どう返す？",
          choices: ["問題の原因を一緒に整理して、解決策を考える", "まず「最近どんなことがあったの？」と話を聞く"],
          reactions: ["ちゃんと、「できる大人だ」尊敬します。", "よっ！！人気者！！"],
          complexChoice: 1
        },
        {
          situation: "最近チームの雰囲気が悪く、会話が少なくなっている。",
          question: "さて、どうする？",
          choices: ["1on1の頻度を増やすスケジュールを組む", "「なぜ雰囲気が悪いのか」の原因を分析する"],
          reactions: ["胃に穴あかない？", "頭痛くなるでしょ？"],
          complexChoice: 1
        }
      ]
    },
    diet: {
      scenes: [
        {
          situation: "ダイエットを始めようと決めた。",
          question: "さて、まず何をする？",
          choices: ["1日の摂取カロリーの上限を決めて、アプリで記録を始める", "「なぜ今まで続かなかったのか」を考える"],
          reactions: ["素直に尊敬。", "やったね。おそろい。"],
          complexChoice: 1
        },
        {
          situation: "始めて3日目。カロリー記録が面倒になってきた。",
          question: "さて、どうする？",
          choices: ["記録するものを「夕食だけ」に絞って続ける", "「なぜ面倒に感じるのか」を掘り下げて考える"],
          reactions: ["かしこいね。マネしよ。", "…で、おなか空くんだよね。"],
          complexChoice: 1
        },
        {
          situation: "1週間続けたが、体重がまったく変わっていない。",
          question: "さて、どうする？",
          choices: ["食事の内容や運動量を見直して、何が足りないか整理する", "「自分には向いていないのかも」と別の方法を探し始める"],
          reactions: ["1週間…ってことは7日間ダイエットできるの⁉", "おそろっち。ハイタッチしよ。"],
          complexChoice: 1
        }
      ]
    },
    date: {
      scenes: [
        {
          situation: "来週のデート、準備を始めようとしている。",
          question: "さて、まず何をする？",
          choices: ["お店を条件で絞り込んで予約する", "「彼女が楽しいと思う空気」を作る方法を考える"],
          reactions: ["絞り込みから緊張するよね。", "君のやさしさがひしひしと伝わってくるよ（涙）"],
          complexChoice: 1
        },
        {
          situation: "当日、食事中に会話が途切れた。",
          question: "さて、どうする？",
          choices: ["事前に用意しておいた話題リストから次のネタを出す", "さっき彼女が笑った話題をもう少し深掘りする"],
          reactions: ["僕の頭の中とおんなじ", "なんですか？デート慣れしてるんですか？"],
          complexChoice: 1
        },
        {
          situation: "食事が終わった。この後どうするか迷っている。",
          question: "さて、どうする？",
          choices: ["事前に調べておいた2軒目のお店に移動する", "彼女の様子を見て、このまま帰るか続けるか決める"],
          reactions: ["スタミナすごい…え、営業職？", "ははーん、モテるでしょ？"],
          complexChoice: 1
        }
      ]
    }
  };

  const characters = [
    {
      id: 'A',
      name: '四角メガネくん',
      emoji: '🤓',
      tagline: '設計図が頭に刺さってるよ。整理と計画大好き。だって、落ち着くもん。',
      diagnosis: '分解できる課題を見つけると、とにかく手を動かしたくなるタイプです。準備の精度は高い。ただ、感情や文脈が絡む場面でも整理しようとすると、相手はその必死さを感じ取ります。「これは整理していい課題か？」を一度だけ問いかけてみてください。'
    },
    {
      id: 'B',
      name: 'いじりがいあるタイプ',
      emoji: '😏',
      tagline: '整理派だけど、フィーリングとか勘も大事にできるかわいいやつ。いっちゃんモテるよ。',
      diagnosis: '分解思考を使いながら、感覚も手放さないバランス型です。整理できる部分はしっかり最適化して、感情が絡む場面では観察に切り替える。その切り替えがもう少し早くなると、さらに動きやすくなります。'
    },
    {
      id: 'C',
      name: 'ヘリウム風船',
      emoji: '🎈',
      tagline: '場の雰囲気察知能力ピカイチ。僕が一番憧れるタイプ。',
      diagnosis: '感情や文脈を読む力が高く、複雑な課題への対応が自然にできています。ただ、分解していい課題まで感覚で乗り切ろうとすると、準備不足になることも。店選びやスケジュール設計など、条件が明確な部分は迷わず分解してください。'
    },
    {
      id: 'D',
      name: 'ウルトラマン帽子',
      emoji: '🦸',
      tagline: '小学生のときウルトラマン帽子やってたでしょ？直感も論理もいい塩梅。できるね。君。',
      diagnosis: '直感と論理を場面によって使い分けられています。分解していい部分は整理して、感情が絡む部分は観察で対応する。この二刀流がすでに身についています。あとは「やめるサイン」を早めに察知できると、さらに無駄がなくなります。'
    }
  ];

  let currentGenre = null;
  let currentScene = 0;
  let selections = [];

  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function startGame(genre) {
    currentGenre = genre;
    currentScene = 0;
    selections = [];
    showScreen('screen-game');
    renderScene();
  }

  function renderScene() {
    const scenes = scenarios[currentGenre].scenes;
    const scene = scenes[currentScene];

    document.getElementById('progress-label').textContent = `場面 ${currentScene + 1} / 3`;

    for (let i = 0; i < 3; i++) {
      const dot = document.getElementById(`dot-${i}`);
      dot.className = 'dot';
      if (i < currentScene) dot.classList.add('done');
      if (i === currentScene) dot.classList.add('active');
    }

    document.getElementById('situation-text').textContent = scene.situation;
    document.getElementById('question-text').textContent = scene.question;

    const btnA = document.getElementById('choice-a');
    const btnB = document.getElementById('choice-b');
    btnA.textContent = 'A：' + scene.choices[0];
    btnB.textContent = 'B：' + scene.choices[1];
    btnA.disabled = false;
    btnB.disabled = false;
    btnA.className = 'choice-btn';
    btnB.className = 'choice-btn';

    const reactionRow = document.getElementById('reaction-row');
    reactionRow.classList.remove('show');
    document.getElementById('next-btn').style.display = 'none';
  }

  function selectChoice(index) {
    const scene = scenarios[currentGenre].scenes[currentScene];

    document.getElementById('choice-a').disabled = true;
    document.getElementById('choice-b').disabled = true;

    if (index === 0) document.getElementById('choice-a').classList.add('selected');
    else document.getElementById('choice-b').classList.add('selected');

    selections.push(index);

    document.getElementById('reaction-text').textContent = scene.reactions[index];
    setTimeout(() => {
      document.getElementById('reaction-row').classList.add('show');
    }, 100);

    const isLast = currentScene === 2;
    const nextBtn = document.getElementById('next-btn');
    nextBtn.textContent = isLast ? '結果を見る ▶' : '次へ ▶';
    nextBtn.style.display = 'block';
  }

  function nextScene() {
    if (currentScene < 2) {
      currentScene++;
      renderScene();
    } else {
      showResult();
    }
  }

  function getCharacter() {
    const scenes = scenarios[currentGenre].scenes;
    let complexCount = 0;
    for (let i = 0; i < 3; i++) {
      if (selections[i] === scenes[i].complexChoice) complexCount++;
    }
    const lastIsComplex = selections[2] === scenes[2].complexChoice;

    if (complexCount <= 1 && !lastIsComplex) return characters[0]; // 四角メガネくん
    if (complexCount <= 1 && lastIsComplex) return characters[1];  // いじりがいあるタイプ
    if (complexCount >= 2 && lastIsComplex) return characters[2];  // ヘリウム風船
    return characters[3];                                           // ウルトラマン帽子
  }

  function showResult() {
    showScreen('screen-result');
    const chara = getCharacter();
    document.getElementById('result-character').textContent = chara.name;
    document.getElementById('result-emoji').textContent = chara.emoji;
    document.getElementById('result-tagline').textContent = chara.tagline;
    document.getElementById('diagnosis-text').textContent = chara.diagnosis;
  }

  function resetGame() {
    showScreen('screen-title');
  }
</script>
</body>
</html>
